services:
  s3-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: s3-service-api
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      PORT: "8080"
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL}
      DB_MIGRATIONS_DIR: /workspace/db/migrations
      DB_MIGRATE_ON_STARTUP: ${DB_MIGRATE_ON_STARTUP:-true}
      DB_SCHEMA_CHECK_ON_STARTUP: ${DB_SCHEMA_CHECK_ON_STARTUP:-true}

  localstack:
    image: localstack/localstack:3
    container_name: s3-service-localstack
    profiles:
      - aws
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  localstack_data:
  go_mod_cache:
  go_build_cache:
